<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hán Tự Quiz Pro</title>
    
    <!-- Google Fonts: Inter cho tiếng Việt và Noto Serif SC cho chữ Hán -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Serif+SC:wght@700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/milligram/1.4.1/milligram.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header-area">
            <h1>Hán Tự Quiz Pro</h1>
            <p>Luyện tập trắc nghiệm từ dữ liệu AI</p>
            <div class="row">
                <div class="column column-60 column-offset-20">
                    <select id="dateSelect">
                        <option value="">-- Đang tải dữ liệu... --</option>
                    </select>
                </div>
            </div>
        </header>

        <div id="mainContent">
            <div class="welcome-msg">Chọn một ngày để bắt đầu thử thách!</div>
        </div>
        
        <div id="actionArea" style="display:none; text-align: center; margin-bottom: 80px;">
           <button class="button button-large" onclick="checkAnswers()">Nộp bài & Kiểm tra</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
