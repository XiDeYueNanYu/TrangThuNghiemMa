<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hán Tự Quiz Pro</title>
    
    <!-- Google Fonts: Inter cho tiếng Việt và Noto Serif SC cho chữ Hán -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Serif+SC:wght@700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/milligram/1.4.1/milligram.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
	<div class="container">
		<header class="header-area">
			<h1>Hán Tự Quiz Pro</h1>
			<div class="row">
				<div class="column column-60 column-offset-20">
					<!-- ID phải là dateSelect -->
					<select id="dateSelect">
						<option value="">-- Đang nạp dữ liệu... --</option>
					</select>
				</div>
			</div>
		</header>

		<!-- Khu vực hiện câu hỏi -->
		<div id="mainContent">
			<div class="welcome-msg" style="text-align: center; padding: 50px; color: #999;">
				Vui lòng chọn ngày học để bắt đầu ôn tập.
			</div>
		</div>
		
		<!-- Nút nộp bài -->
		<div id="actionArea" style="display:none; text-align: center; margin: 40px 0 100px 0;">
		   <button class="button button-large" onclick="checkAnswers()">Nộp bài & Xem giải thích</button>
		</div>
	</div>
    <script src="script.js"></script>
</body>
</html>
